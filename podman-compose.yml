version: '3.8'
services:
  redis:
    image: redis:alpine
    container_name: agent_cache
    ports:
      - "6379:6379"
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    # volumes:
    #   - ~/.config/gcloud/application_default_credentials.json:/auth/key.json:ro
    depends_on:
      - redis
  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend