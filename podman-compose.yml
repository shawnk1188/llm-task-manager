version: "3.9"

networks:
  task-net:
    driver: bridge

volumes:
  redis-data:

services:
  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: docker.io/redis:7-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - task-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ────────────────────────────────────────────────────────
  fastapi-app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi-app
    env_file: .env
    ports:
      - "8000:8000"
    networks:
      - task-net
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Streamlit frontend ─────────────────────────────────────────────────────
  streamlit-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: streamlit-app
    env_file: .env
    ports:
      - "8501:8501"
    networks:
      - task-net
    depends_on:
      fastapi-app:
        condition: service_healthy
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: docker.io/prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - task-net
    restart: unless-stopped
